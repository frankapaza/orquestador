name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Limpiando contenedores de despliegues interrumpidos..."
            # Al recrear, docker compose renombra el contenedor viejo a "<hash>_kubo_x"
            # antes de borrarlo. Si eso queda a medias, el siguiente deploy falla con
            # "container name is already in use". Aquí se borran SOLO esos renombrados:
            # los legítimos se llaman exactamente kubo_api / kubo_web / kubo_postgres.
            docker ps -a --format '{{.ID}} {{.Names}}' \
              | awk '$2 ~ /^[0-9a-f]+_kubo_/ {print $1}' \
              | xargs -r docker rm -f || true

            echo "→ Building and restarting containers..."
            docker compose up -d --build --remove-orphans

            echo "→ Running database migrations..."
            docker compose exec -T api node src/db/migrate.js

            echo "→ Cleaning unused Docker images..."
            docker image prune -f

            echo "✓ Deploy completado"
